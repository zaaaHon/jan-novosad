<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jan Novosad</title>

<style>
body{
  margin:0;
  font-family:Georgia, serif;
  color:#f7f1e7;
  background:#0b1114 url("background.jpg") center/cover no-repeat;
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.hero{
  text-align:center;
  padding:80px 20px;
}

h1{
  font-size:40px;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 20px;
  border-radius:999px;
  background:#d6c395;
  color:#000;
}

.section{
  margin-top:60px;
}

.panel{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
}

/* STŘED S LOGEM */
.services{
  position:relative;
  height:300px;
  margin-top:40px;
}

.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:140px;
  height:140px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
}

.center img{
  width:100%;
  height:100%;
  object-fit:contain;
  padding:15px;
}

/* POZVÁNKY */
.invites{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.invite img{
  width:100%;
  border-radius:16px;
}

/* QR */
.qr{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:20px;
}

.qr img{
  width:100%;
  max-width:140px;
}

@media(max-width:700px){
  .invites,.qr{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="wrap">

<!-- HERO -->
<div class="hero">
  <h1>Jan Novosad</h1>
  <p>Bezpečí nehledej venku. Najdi ho v sobě.</p>
  <a href="#kontakt" class="btn">Domluvit setkání</a>
</div>

<!-- LOGO VE STŘEDU -->
<div class="section panel">
  <h2>Moje práce</h2>

  <div class="services">
    <div class="center">
      <img src="logo.jpg" alt="logo">
    </div>
  </div>
</div>

<!-- GALERIE -->
<div class="section panel">
  <h2>Galerie</h2>
  <img src="akce1.jpg" style="width:100%; border-radius:16px;">
</div>

<!-- POZVÁNKY -->
<div class="section panel">
  <h2>Pozvání na akce</h2>

  <div class="invites">
    <div class="invite"><img src="letacek1.jpg"></div>
    <div class="invite"><img src="letacek2.jpg"></div>
    <div class="invite"><img src="letacek3.jpg"></div>
  </div>
</div>

<!-- KONTAKT -->
<div id="kontakt" class="section panel">
  <h2>Kontakt</h2>

  <p>Email: <a href="mailto:jan.novosad@seznam.cz">jan.novosad@seznam.cz</a></p>

  <div class="qr">
    <div><img src="qr1.png"><p>kruhy</p></div>
    <div><img src="qr2.png"><p>chlapci</p></div>
    <div><img src="qr3.png"><p>smíšené</p></div>
  </div>
</div>

</div>

</body>
</html>
