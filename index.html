<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jan Novosad</title>

<style>

body{
font-family: Georgia, serif;
margin:0;
padding:0;
background:linear-gradient(#f5f5f5,#ffffff);
color:#2f3a2f;
line-height:1.6;
}

/* HLAVIČKA */

header{
text-align:center;
padding:80px 20px 40px 20px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.subtitle{
font-size:18px;
color:#666;
}

/* SEKCE */

section{
max-width:800px;
margin:auto;
padding:40px 20px;
}

h2{
font-size:28px;
margin-bottom:20px;
}

ul{
padding-left:20px;
}

/* ATMOSFÉRY */

.forest{
background:
radial-gradient(circle at 30% 30%, rgba(200,230,200,0.7), transparent 40%),
linear-gradient(#e6f2e6,#ffffff);
}

.water{
background:
radial-gradient(circle at 60% 20%, rgba(200,220,240,0.6), transparent 40%),
linear-gradient(#e8f4ff,#ffffff);
}

.meadow{
background:
radial-gradient(circle at 40% 60%, rgba(240,230,180,0.6), transparent 40%),
linear-gradient(#f4f7e8,#ffffff);
}

/* PŘEPÍNAČ PROSTŘEDÍ */

.environment-switch{
position:fixed;
top:20px;
right:20px;
display:flex;
gap:10px;
}

.environment-switch button{
border:none;
padding:8px 10px;
cursor:pointer;
font-size:18px;
background:white;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

</style>

</head>

<body>

<div class="environment-switch">
<button onclick="setEnvironment('forest')">🌲</button>
<button onclick="setEnvironment('water')">💧</button>
<button onclick="setEnvironment('meadow')">🌾</button>
</div>

<header>

<h1>Jan Novosad</h1>

<p class="subtitle">
Odpověď si každý nese v sobě.
</p>

</header>

<section>

<h2>Můj příběh</h2>

<p>Moje cesta vedla od výkonu ke klidu.</p>

<p>Od kontroly k důvěře v rytmus.</p>

<p>Inspirací je mi příroda a její cykličnost.</p>

</section>

<section>

<h2>Benefity zpomalení</h2>

<ul>
<li>Regulace nervového systému</li>
<li>Hlubší kontakt s tělem</li>
<li>Jasnější rozhodování</li>
<li>Vnitřní stabilita</li>
</ul>

</section>

<script>

function setEnvironment(type){
document.body.classList.remove("forest","water","meadow");
document.body.classList.add(type);
}

</script>

</body>
</html>
